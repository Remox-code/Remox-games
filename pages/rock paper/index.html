<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="layout">

        <aside class="menu">
            <h1>Points:</h1>

            <div class="points">
                <h2>User:</h2>
                <div id="user-point">0</div>

                <h2>CPU:</h2>
                <div id="cpu-point">0</div>
            </div>

            <div class="result-container">
                <h2>Total Score (User):</h2>
                <div id="user-point-total">0</div>

                <h2>Total Score (CPU):</h2>
                <div id="cpu-point-total">0</div>
            </div>

            <div class="btn-container">
                <button id="btnRefresh">Refresh</button>
                <button id="btn">Again</button>
            </div>

            <h1 class="a">Press "A" for Again</h1>
            <h1 class="a">Press "R" for Ref</h1>
        </aside>

        <div class="page">

            <ul class="nav-links">
                <li><a href="../../index.html">Guess Number</a></li>
                <li><a href="../challenge/index.html">Random Challenge</a></li>
                <li><a href="../Tas/index.html">Dice Rolling</a></li>
            </ul>

            <h1 id="h1">Rock, Paper, Scissors</h1>

            <div class="container">

                <h1 id="result"></h1>

                <h1>Choose your weapon</h1>
                <h1 id="result"></h1>

                <div class="user-choose">
                    <img src="../../img/1.png" class="choosed-weapon" alt="">
                    <img src="../../img/2.png" class="choosed-weapon" alt="">
                    <img src="../../img/3.png" class="choosed-weapon" alt="">
                </div>

                <h1>CPU chooses:</h1>
                <div class="cpu-choose">
                    <img src="../../img/1.png" class="cpu-choosed-weapon hidden" alt="">
                    <img src="../../img/2.png" class="cpu-choosed-weapon hidden" alt="">
                    <img src="../../img/3.png" class="cpu-choosed-weapon hidden" alt="">
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
